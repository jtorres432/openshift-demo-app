ind: Deployment
apiVersion: apps/v1
metadata:
  name: simple-http-server
  labels:
    app: simple-http-server
    app.kubernetes.io/component: simple-http-server
    app.kubernetes.io/instance: simple-http-server
    app.kubernetes.io/name: simple-http-server
    app.kubernetes.io/part-of: simple-http-server-app
    app.openshift.io/runtime: other-linux
    app.openshift.io/runtime-namespace: simple-http
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-http-server
  template:
    metadata:
      labels:
        app: simple-http-server
        deployment: simple-http-server
      annotations:
        # Important for primary udn:
        k8s.ovn.org/open-default-ports: |
          - protocol: tcp
            port: 8080
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - simple-http-server
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: simple-http-server
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "1"
              memory: "1Gi"
          resizePolicy: 
            - resourceName: cpu
              restartPolicy: NotRequired
            - resourceName: memory
              restartPolicy: RestartContainer
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef: 
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef: 
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /readiness-probe
              port: 8080
              scheme: HTTP
            timeoutSeconds: 1
            periodSeconds: 1
            successThreshold: 1
            failureThreshold: 1
          terminationMessagePath: /dev/termination-log
          livenessProbe:
            httpGet:
              path: /liveness-probe
              port: 8080
              scheme: HTTP
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 1
          ports:
            - containerPort: 8080
              protocol: TCP
          imagePullPolicy: Always
          terminationMessagePolicy: File
          image: quay.io/openshift-examples/simple-http-server:202605070951
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
